name: Scheduled Chaos Experiments

on:
  schedule:
    # Run chaos experiments on staging every Tuesday and Thursday at 10:00 UTC
    - cron: "0 10 * * 2,4"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  KUBECONFIG_SECRET: STAGING_KUBECONFIG

jobs:
  # ── Pre-flight: validate steady state ────────────────────────────────────────
  steady-state-check:
    name: Verify Steady State
    runs-on: ubuntu-latest
    outputs:
      healthy: ${{ steps.check.outputs.healthy }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Check steady state
        id: check
        run: |
          chmod +x scripts/check-steady-state.sh
          if ./scripts/check-steady-state.sh frontend backend; then
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Abort if not healthy
        if: steps.check.outputs.healthy != 'true'
        run: |
          echo "❌ System is not in steady state. Aborting chaos experiments."
          exit 1

  # ── Experiment 1: pod-delete ──────────────────────────────────────────────
  pod-delete:
    name: "Experiment: Pod Delete"
    runs-on: ubuntu-latest
    needs: steady-state-check
    environment: staging   # requires environment approval

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Run pod-delete experiment
        id: experiment
        run: |
          chmod +x scripts/run-experiment.sh
          ./scripts/run-experiment.sh pod-delete default frontend 2>&1 | tee experiment-pod-delete.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Collect results
        if: always()
        run: |
          kubectl get chaosresult pod-delete-engine-pod-delete -n default \
            -o jsonpath='{.status.experimentStatus}' 2>/dev/null || echo "No result found"

      - name: Upload experiment log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pod-delete-results-${{ github.run_id }}
          path: experiment-pod-delete.log

  # ── Experiment 2: network-latency ────────────────────────────────────────
  network-latency:
    name: "Experiment: Network Latency"
    runs-on: ubuntu-latest
    needs: pod-delete   # run sequentially to avoid compounding effects

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Run network-latency experiment
        run: |
          chmod +x scripts/run-experiment.sh
          ./scripts/run-experiment.sh network-latency default backend 2>&1 | tee experiment-network.log

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: network-latency-results-${{ github.run_id }}
          path: experiment-network.log

  # ── Post-chaos: verify recovery ────────────────────────────────────────────
  verify-recovery:
    name: Verify System Recovery
    runs-on: ubuntu-latest
    needs: [pod-delete, network-latency]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Wait for system to stabilise
        run: sleep 60

      - name: Verify steady state restored
        id: recovery
        run: |
          chmod +x scripts/check-steady-state.sh
          ./scripts/check-steady-state.sh frontend backend

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔥 System did not recover after chaos experiments (run #${context.runId})`,
              body: `## Chaos Experiment Recovery Failure\n\n` +
                    `**Run**: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n` +
                    `**Date**: ${new Date().toISOString()}\n\n` +
                    `The system failed to return to steady state after chaos experiments.\n\n` +
                    `**Affected services**: frontend, backend\n\n` +
                    `Please investigate immediately.`,
              labels: ['chaos', 'incident', 'P1']
            })
